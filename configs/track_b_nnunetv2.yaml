track_b:
  name: mednext_official_nnunet_style
  dataset_id: 502
  dataset_name: BraTSMENRT

  # Source dataset roots (local or Kaggle-mounted).
  train_root: /kaggle/input/brats-men-rt/BraTS2024-MEN-RT-TrainingData
  val_root: /kaggle/input/brats-men-rt/BraTS2024-MEN-RT-ValidationData

  # nnUNet workspace roots.
  nnunet_raw: /kaggle/working/nnUNet_raw
  nnunet_preprocessed: /kaggle/working/nnUNet_preprocessed
  nnunet_results: /kaggle/working/nnUNet_results

  # Data conversion details.
  image_keyword: _t1c.nii.gz
  label_keyword: _gtv.nii.gz
  copy_mode: copy
  clean_output: true

  # Training setup.
  configuration: 3d_fullres
  folds: [0, 1, 2, 3, 4]
  trainer_name: nnUNetTrainerMedNeXt  # Explicit trainer override for Track-B.
  require_mednext_trainer: true

  # Controls.
  verify_dataset_integrity: true
  run_prepare: true
  run_plan_and_preprocess: true
  run_train: true
  run_find_best: true
